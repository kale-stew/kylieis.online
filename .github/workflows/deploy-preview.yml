name: deploy preview

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PREVIEW_NAME: kylieis-online-pr-${{ github.event.pull_request.number }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: install deps
        run: npm ci

      - name: build static assets
        run: npm run build

      - name: apply migrations to preview db
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: d1 migrations apply kylieis-online-db-preview --remote --env preview

      - name: seed preview db
        run: npx tsx scripts/seed-db.mjs > /tmp/seed.sql && npx wrangler d1 execute kylieis-online-db-preview --remote --env preview --file /tmp/seed.sql
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: generate preview config
        run: |
          jq --arg name "$PREVIEW_NAME" '
            .name = $name
            | .d1_databases[0].database_id = "77521670-d5ba-43af-bd95-c4370dfcba4b"
            | .d1_databases[0].database_name = "kylieis-online-db-preview"
            | del(.routes)
          ' wrangler.jsonc > /tmp/wrangler-preview.jsonc
          cat /tmp/wrangler-preview.jsonc

      - name: deploy to preview env
        id: deploy
        run: npx wrangler deploy --config /tmp/wrangler-preview.jsonc
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: comment preview url
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: 'preview deployed: https://${{ env.PREVIEW_NAME }}.bb52c0e5f3a93fc72779915d7dc6982b.workers.dev'
            });
