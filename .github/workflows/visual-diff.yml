name: visual diff

on:
  pull_request:
    types: [opened, synchronize]
  workflow_run:
    workflows: ["deploy preview"]
    types: [completed]

concurrency:
  group: visual-diff-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

env:
  ACCOUNT_ID: bb52c0e5f3a93fc72779915d7dc6982b

jobs:
  screenshot:
    runs-on: ubuntu-latest
    if: github.event.workflow_run == null || github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: read
      pull-requests: write
      actions: read
    steps:
      - uses: actions/checkout@v4

      - name: get preview url
        id: url
        run: |
          # TODO: for workflow_run trigger, fetch dynamic URL from deploy-preview artifacts
          # for now, use the static preview URL (works for PR trigger)
          echo "url=https://kylieis-online-preview.kylieski.workers.dev" >> "$GITHUB_OUTPUT"

      - name: screenshot key pages
        env:
          TOKEN: ${{ secrets.CLOUDFLARE_BROWSER_RENDERING_TOKEN }}
        run: |
          mkdir -p screenshots
          URL="${{ steps.url.outputs.url }}"
          FAILED=0

          pages=(
            "/:home"
            "/blog:blog"
            "/about:about"
            "/now:now"
            "/photos:photos"
          )

          for page in "${pages[@]}"; do
            path="${page%%:*}"
            name="${page##*:}"
            echo "screenshotting $URL$path → $name.png"
            
            HTTP_CODE=$(curl -s -X POST \
              "https://api.cloudflare.com/client/v4/accounts/${ACCOUNT_ID}/browser-rendering/screenshot" \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              -d "{
                \"url\": \"${URL}${path}\",
                \"viewport\": {\"width\": 1440, \"height\": 900},
                \"waitUntil\": \"networkIdle\",
                \"screenshotOptions\": {\"fullPage\": true, \"type\": \"png\"}
              }" \
              --output "screenshots/${name}.png" \
              --write-out "%{http_code}" \
              -L)
            
            if [ "$HTTP_CODE" != "200" ]; then
              echo "::warning::Screenshot failed for $path (HTTP $HTTP_CODE)"
              FAILED=$((FAILED + 1))
            else
              echo "✓ $name.png captured"
            fi
          done

          ls -la screenshots/
          
          if [ "$FAILED" -eq "${#pages[@]}" ]; then
            echo "::error::All screenshots failed"
            exit 1
          fi

      - name: upload screenshots
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-pr-${{ github.event.pull_request.number || github.run_id }}
          path: screenshots/*.png
          retention-days: 30

      - name: post comment
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          # create markdown with embedded images (github auto-converts artifact urls? no, we need to use html or links)
          # for now, post a comment with links to the artifact
          cat > /tmp/comment.md << 'EOF'
          ## visual diff screenshots

          screenshots captured for preview deployment.

          | page | status |
          |------|--------|
          | home | captured |
          | blog | captured |
          | about | captured |
          | now | captured |
          | photos | captured |

          download artifacts: [screenshots](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
          EOF

          gh pr comment "$PR" --repo ${{ github.repository }} --body-file /tmp/comment.md || true
